name: Deploy to Xserver

on:
  push:
    branches: ["main"]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ── 1. 백엔드 빌드 ──────────────────────────────────────────
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Build Backend (JAR)
        run: chmod +x ./gradlew && ./gradlew bootJar

      # ── 2. 프론트엔드 빌드 (Static Export) ─────────────────────
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Build Frontend (Static Export)
        run: cd frontend && npm ci && STATIC_EXPORT=true npm run build

      # ── 3. 파일 전송 ────────────────────────────────────────────
      - name: Copy JAR to Xserver
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.XSERVER_HOST }}
          username: ${{ secrets.XSERVER_USER }}
          key: ${{ secrets.XSERVER_SSH_KEY }}
          port: ${{ secrets.XSERVER_PORT }}
          source: "build/libs/*.jar"
          target: "/home/xs799946/mountain-info.com/backend"
          strip_components: 2

      - name: Copy Static Frontend to Xserver
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.XSERVER_HOST }}
          username: ${{ secrets.XSERVER_USER }}
          key: ${{ secrets.XSERVER_SSH_KEY }}
          port: ${{ secrets.XSERVER_PORT }}
          source: "frontend/out/"
          target: "/home/xs799946/mountain-info.com/public_html"
          strip_components: 2

      - name: Copy proxy.php and .htaccess to public_html
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.XSERVER_HOST }}
          username: ${{ secrets.XSERVER_USER }}
          key: ${{ secrets.XSERVER_SSH_KEY }}
          port: ${{ secrets.XSERVER_PORT }}
          source: "docker/xserver/proxy.php,docker/xserver/.htaccess"
          target: "/home/xs799946/mountain-info.com/public_html"
          strip_components: 2

      # ── 4. 백엔드 재시작 ─────────────────────────────────────────
      - name: Restart Backend
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.XSERVER_HOST }}
          username: ${{ secrets.XSERVER_USER }}
          key: ${{ secrets.XSERVER_SSH_KEY }}
          port: ${{ secrets.XSERVER_PORT }}
          script: |
            set -a
            source /home/xs799946/mountain-info.com/.env
            set +a

            cd /home/xs799946/mountain-info.com/backend
            fuser -k 8081/tcp || true
            sleep 1

            nohup /home/xs799946/jdk-17.0.10+7/bin/java -Xms128M -Xmx256M \
              -DSPRING_PROFILES_ACTIVE=prod \
              -DSERVER_PORT=8081 \
              -DSPRING_DATASOURCE_URL="jdbc:mysql://${RDS_ENDPOINT}:3306/${MYSQL_DATABASE}?useSSL=false&allowPublicKeyRetrieval=true&characterEncoding=UTF-8&serverTimezone=Asia/Tokyo" \
              -DSPRING_DATASOURCE_USERNAME="${MYSQL_USER}" \
              -DSPRING_DATASOURCE_PASSWORD="${MYSQL_PASSWORD}" \
              -DSPRING_DATA_REDIS_HOST="${SPRING_DATA_REDIS_HOST}" \
              -DSPRING_DATA_REDIS_PORT="${SPRING_DATA_REDIS_PORT}" \
              -DSPRING_DATA_REDIS_PASSWORD="${SPRING_DATA_REDIS_PASSWORD}" \
              -DSPRING_DATA_REDIS_SSL="${SPRING_DATA_REDIS_SSL}" \
              -DMAIL_HOST="${MAIL_HOST}" \
              -DMAIL_PORT="${MAIL_PORT}" \
              -DMAIL_USERNAME="${MAIL_USERNAME}" \
              -DMAIL_PASSWORD="${MAIL_PASSWORD}" \
              -DMAIL_TO="${MAIL_TO}" \
              -DJWT_SECRET="${JWT_SECRET}" \
              -DADMIN_INIT_USERNAME="${ADMIN_INIT_USERNAME}" \
              -DADMIN_INIT_PASSWORD="${ADMIN_INIT_PASSWORD}" \
              -DAPP_FRONTEND_BASE_URL="${APP_FRONTEND_BASE_URL}" \
              -DAWS_REGION="${AWS_REGION}" \
              -DAWS_ACCESS_KEY_ID="${AWS_ACCESS_KEY_ID}" \
              -DAWS_SECRET_ACCESS_KEY="${AWS_SECRET_ACCESS_KEY}" \
              -DS3_BUCKET="${S3_BUCKET}" \
              -DS3_PUBLIC_BASE_URL="${S3_PUBLIC_BASE_URL}" \
              -jar *.jar > nohup-backend.out 2>&1 &

            echo "Backend started on port 8081"
