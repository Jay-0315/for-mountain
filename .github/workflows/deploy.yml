name: Deploy to EC2 via ECR

on:
  push:
    branches: ["main"]

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}
  BACKEND_REPOSITORY: ${{ secrets.ECR_REPOSITORY_BACKEND }}
  FRONTEND_REPOSITORY: ${{ secrets.ECR_REPOSITORY_FRONTEND }}

jobs:
  deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push backend image
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build \
            -t "$REGISTRY/$BACKEND_REPOSITORY:$IMAGE_TAG" \
            -t "$REGISTRY/$BACKEND_REPOSITORY:latest" \
            .
          docker push "$REGISTRY/$BACKEND_REPOSITORY:$IMAGE_TAG"
          docker push "$REGISTRY/$BACKEND_REPOSITORY:latest"

      - name: Build and push frontend image
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build \
            -t "$REGISTRY/$FRONTEND_REPOSITORY:$IMAGE_TAG" \
            -t "$REGISTRY/$FRONTEND_REPOSITORY:latest" \
            ./frontend
          docker push "$REGISTRY/$FRONTEND_REPOSITORY:$IMAGE_TAG"
          docker push "$REGISTRY/$FRONTEND_REPOSITORY:latest"

      - name: Deploy on EC2
        uses: appleboy/ssh-action@v1.2.0
        env:
          AWS_REGION: ${{ env.AWS_REGION }}
          AWS_ACCOUNT_ID: ${{ env.AWS_ACCOUNT_ID }}
          BACKEND_REPOSITORY: ${{ env.BACKEND_REPOSITORY }}
          FRONTEND_REPOSITORY: ${{ env.FRONTEND_REPOSITORY }}
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: AWS_REGION,AWS_ACCOUNT_ID,BACKEND_REPOSITORY,FRONTEND_REPOSITORY
          script: |
            set -e
            cd ~/for-mountain
            git fetch origin main
            git reset --hard origin/main
            aws ecr get-login-password --region "$AWS_REGION" | docker login --username AWS --password-stdin "$AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com"
            docker compose --env-file .env -f docker-compose.prod.yml pull
            docker compose --env-file .env -f docker-compose.prod.yml up -d
            docker image prune -f
