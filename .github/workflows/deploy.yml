name: Deploy to Xserver

on:
  push:
    branches: ["main"]

env:
  ROOT_DIR: /home/xs799946/mountain-info.com
  BACKEND_DIR: /home/xs799946/mountain-info.com/backend
  PUBLIC_DIR: /home/xs799946/mountain-info.com/public_html
  FRONTEND_TMP_DIR: /home/xs799946/mountain-info.com/.deploy_frontend

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ── 1. 백엔드 빌드 ──────────────────────────────────────────
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Build Backend (JAR)
        run: chmod +x ./gradlew && ./gradlew bootJar

      # ── 2. 프론트엔드 빌드 (Static Export) ─────────────────────
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Build Frontend (Static Export)
        run: cd frontend && npm ci && STATIC_EXPORT=true npm run build

      # ── 3. 파일 전송 ────────────────────────────────────────────
      - name: Copy JAR to Xserver
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.XSERVER_HOST }}
          username: ${{ secrets.XSERVER_USER }}
          key: ${{ secrets.XSERVER_SSH_KEY }}
          port: ${{ secrets.XSERVER_PORT }}
          source: "build/libs/*.jar"
          target: ${{ env.BACKEND_DIR }}
          strip_components: 2

      - name: Copy Static Frontend to Xserver temp directory
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.XSERVER_HOST }}
          username: ${{ secrets.XSERVER_USER }}
          key: ${{ secrets.XSERVER_SSH_KEY }}
          port: ${{ secrets.XSERVER_PORT }}
          source: "frontend/out/"
          target: ${{ env.FRONTEND_TMP_DIR }}
          strip_components: 2

      - name: Copy proxy.php and .htaccess to Xserver temp directory
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.XSERVER_HOST }}
          username: ${{ secrets.XSERVER_USER }}
          key: ${{ secrets.XSERVER_SSH_KEY }}
          port: ${{ secrets.XSERVER_PORT }}
          source: "docker/xserver/proxy.php,docker/xserver/.htaccess"
          target: ${{ env.FRONTEND_TMP_DIR }}
          strip_components: 2

      - name: Publish Frontend
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.XSERVER_HOST }}
          username: ${{ secrets.XSERVER_USER }}
          key: ${{ secrets.XSERVER_SSH_KEY }}
          port: ${{ secrets.XSERVER_PORT }}
          script: |
            set -eu
            mkdir -p "${{ env.PUBLIC_DIR }}"
            mkdir -p "${{ env.FRONTEND_TMP_DIR }}"

            find "${{ env.PUBLIC_DIR }}" -mindepth 1 -maxdepth 1 ! -name ".well-known" -exec rm -rf {} +
            cp -R "${{ env.FRONTEND_TMP_DIR }}/"* "${{ env.PUBLIC_DIR }}/"
            cp "${{ env.FRONTEND_TMP_DIR }}/proxy.php" "${{ env.PUBLIC_DIR }}/proxy.php"
            cp "${{ env.FRONTEND_TMP_DIR }}/.htaccess" "${{ env.PUBLIC_DIR }}/.htaccess"

            ls -la "${{ env.PUBLIC_DIR }}" | head

      # ── 4. 백엔드 재시작 ─────────────────────────────────────────
      - name: Restart Backend
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.XSERVER_HOST }}
          username: ${{ secrets.XSERVER_USER }}
          key: ${{ secrets.XSERVER_SSH_KEY }}
          port: ${{ secrets.XSERVER_PORT }}
          script: |
            set -eu
            set -a
            . "${{ env.ROOT_DIR }}/.env"
            set +a

            OLD_PID="$(ps -ef | grep 'for-mountain-0.0.1-SNAPSHOT.jar' | grep -v grep | awk '{print $2}' || true)"
            if [ -n "${OLD_PID:-}" ]; then
              kill "${OLD_PID}" || true
              sleep 3
              if kill -0 "${OLD_PID}" 2>/dev/null; then
                kill -9 "${OLD_PID}" || true
                sleep 1
              fi
            fi

            cd "${{ env.BACKEND_DIR }}"
            nohup /home/xs799946/jdk-17.0.10+7/bin/java \
              -Dspring.profiles.active=prod \
              -Xms128M -Xmx256M \
              -jar for-mountain-0.0.1-SNAPSHOT.jar > nohup.out 2>&1 &

            sleep 5
            ps -ef | grep 'for-mountain-0.0.1-SNAPSHOT.jar' | grep -v grep || true
            tail -n 30 nohup.out
