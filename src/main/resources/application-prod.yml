spring:
  config:
    activate:
      on-profile: prod

  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}

  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:mountain-redis}
      port: ${SPRING_DATA_REDIS_PORT:6379}

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        show_sql: false
        format_sql: false
        dialect: org.hibernate.dialect.MySQLDialect

  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true

server:
  port: ${PORT:8080}

app:
  jwt:
    secret: ${JWT_SECRET}
    expiration-ms: 86400000
    refresh-expiration-ms: 604800000
  admin:
    init-username: ${ADMIN_INIT_USERNAME:admin}
    init-password: ${ADMIN_INIT_PASSWORD}
  frontend-base-url: ${APP_FRONTEND_BASE_URL}
  mail:
    to: ${MAIL_TO}
  s3:
    region: ${AWS_REGION:}
    bucket: ${S3_BUCKET:}
    public-base-url: ${S3_PUBLIC_BASE_URL:}
    upload-expiration-minutes: ${S3_UPLOAD_EXPIRATION_MINUTES:10}
