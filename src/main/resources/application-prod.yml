spring:
  config:
    activate:
      on-profile: prod

  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    hikari:
      minimum-idle: ${SPRING_DATASOURCE_HIKARI_MINIMUM_IDLE:0}
      maximum-pool-size: ${SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE:10}
      idle-timeout: ${SPRING_DATASOURCE_HIKARI_IDLE_TIMEOUT:60000}
      # Recycle pooled connections aggressively to avoid stale sockets on shared hosting.
      max-lifetime: ${SPRING_DATASOURCE_HIKARI_MAX_LIFETIME:240000}
      keepalive-time: ${SPRING_DATASOURCE_HIKARI_KEEPALIVE_TIME:120000}
      connection-timeout: ${SPRING_DATASOURCE_HIKARI_CONNECTION_TIMEOUT:30000}
      validation-timeout: ${SPRING_DATASOURCE_HIKARI_VALIDATION_TIMEOUT:5000}

  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:mountain-redis}
      port: ${SPRING_DATA_REDIS_PORT:6379}
      password: ${SPRING_DATA_REDIS_PASSWORD:}
      ssl:
        enabled: ${SPRING_DATA_REDIS_SSL:false}

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        show_sql: false
        format_sql: false
        dialect: org.hibernate.dialect.MySQLDialect

  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true

server:
  port: ${PORT:8080}

app:
  jwt:
    secret: ${JWT_SECRET}
    expiration-ms: 86400000
    refresh-expiration-ms: 604800000
  admin:
    init-username: ${ADMIN_INIT_USERNAME:admin}
    init-password: ${ADMIN_INIT_PASSWORD}
  frontend-base-url: ${APP_FRONTEND_BASE_URL}
  mail:
    to: ${MAIL_TO}
  upload:
    dir: ${UPLOAD_DIR:/home/xs799946/mountain-info.com/uploads}
  s3:
    region: ${AWS_REGION:}
    bucket: ${S3_BUCKET:}
    public-base-url: ${S3_PUBLIC_BASE_URL:}
    upload-expiration-minutes: ${S3_UPLOAD_EXPIRATION_MINUTES:10}
