spring:
  config:
    activate:
      on-profile: dev
  datasource:
    url: jdbc:mysql://localhost:3306/mountain_db?useSSL=false&allowPublicKeyRetrieval=true&characterEncoding=UTF-8&serverTimezone=Asia/Seoul
    username: root
    password: h3069315
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
        show_sql: true
        dialect: org.hibernate.dialect.MySQLDialect

  logging:
    level:
      org.hibernate.SQL: debug

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME:your-email@gmail.com}
    password: ${MAIL_PASSWORD:your-app-password}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true

app:
  jwt:
    secret: ${JWT_SECRET:dev-secret-key-must-be-at-least-32-chars-long}
    expiration-ms: 86400000          # access token: 1일(にち)
    refresh-expiration-ms: 604800000 # refresh token: 7일(にち)
  admin:
    init-username: ${ADMIN_INIT_USERNAME:admin}
    init-password: ${ADMIN_INIT_PASSWORD:1234}
  mail:
    to: ${MAIL_TO:info@for-mountain.co.jp}
