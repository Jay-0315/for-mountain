version: '3.8'

services:
  mysql-db:
    image: mysql:8.0
    container_name: mountain-mysql
    restart: always
    environment:
      MYSQL_DATABASE: mountain_db
      MYSQL_ROOT_PASSWORD: root
      MYSQL_USER: user
      MYSQL_PASSWORD: password
      TZ: Asia/Seoul
    ports:
      - "3308:3306"
    command:
      --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    networks:
      - mountain-network
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  mountain-redis:
    image: redis:alpine
    container_name: mountain-redis
    ports:
      - "6379:6379"
    networks:
      - mountain-network



  backend:
    build: .
    container_name: mountain-backend
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql-db:3306/mountain_db?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
      SPRING_DATASOURCE_USERNAME: user
      SPRING_DATASOURCE_PASSWORD: password
      SPRING_DATA_REDIS_HOST: mountain-redis
      SPRING_DATA_REDIS_PORT: 6379
      MAIL_USERNAME: ${MAIL_USERNAME:-your-email@gmail.com}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-your-app-password}
      MAIL_TO: ${MAIL_TO:-info@for-mountain.co.jp}
      JWT_SECRET: ${JWT_SECRET:-dev-secret-key-must-be-at-least-32-chars-long}
      ADMIN_CODE: ${ADMIN_CODE:-mountain-admin-2024}
    networks:
      - mountain-network

    depends_on:
      mysql-db:
        condition: service_healthy
      mountain-redis:
        condition: service_started

  frontend:
    build: ./frontend
    container_name: mountain-frontend
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      BACKEND_URL: http://mountain-backend:8080
    networks:
      - mountain-network

networks:
  mountain-network:
    driver: bridge